name: test on push

on:
  push:
    branches: ['master']

jobs:
  python:
    name: Run Tests (TDD)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "apache-airflow==2.7.3" \
            --constraint "https://raw.githubusercontent.com/apache/airflow/constraints-2.7.3/constraints-3.9.txt"
          pip install -r utils/requirements.txt

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$PYTHONPATH:$(pwd)" >> $GITHUB_ENV

      - name: Init Airflow DB
        run: |
          airflow db init

      - name: Run unit and integration tests
        run: |
          PYTHONPATH=$(pwd) pytest tests/

  docker:
    name: Build and Test Docker
    runs-on: ubuntu-latest
    needs: python

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t myimage:latest .

      - name: Run Docker container
        run: docker run -d -p 8000:8000 --name mycontainer myimage:latest

      - name: Check container is running
        run: docker ps

      - name: Stop Docker container
        run: docker stop mycontainer